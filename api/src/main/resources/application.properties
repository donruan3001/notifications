spring.application.name=api

# Prioriza o host 'postgres' do Docker, senão usa localhost
spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_URL_HOST:localhost}:5432/notification
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
jwt.private.key=classpath:private.key
jwt.public.key=classpath:public.pem

server.port=8083
server.servlet.context-path=/api
debug=true

# Eureka: Prioriza o host 'eureka-server' do Docker
eureka.client.register-with-eureka=true
eureka.client.serviceUrl.defaultZone=http://${EUREKA_SERVER_HOST:localhost}:8081/eureka

# RabbitMQ: Prioriza o host 'rabbitmq' do Docker
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

server.error.include-message=always
