spring.application.name=sms
server.port=8085
debug=true

# Twilio (serão injetados pelo Docker)
twilio.sid=${TWILIO_ACCOUNT_SID}
twilio.token=${TWILIO_AUTH_TOKEN}

# Eureka: Conecta no host 'eureka-server' do Docker
eureka.client.serviceUrl.defaultZone=http://${EUREKA_SERVER_HOST:localhost}:8081/eureka

# RabbitMQ: Conecta no host 'rabbitmq' do Docker
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

number.sms.value=${NUMBER_SMS}